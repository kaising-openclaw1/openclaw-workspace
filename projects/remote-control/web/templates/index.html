<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RemoteEye - 远程控制台</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="app">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">👁️</span>
                <h1>RemoteEye</h1>
            </div>
            <div class="status">
                <span id="connection-status" class="status-dot offline"></span>
                <span id="connection-text">未连接</span>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 左侧：设备列表 -->
            <aside class="sidebar">
                <h2>📱 在线设备</h2>
                <ul id="device-list" class="device-list">
                    <li class="empty-state">正在加载设备列表...</li>
                </ul>
            </aside>

            <!-- 右侧：远程桌面 -->
            <section class="desktop-area">
                <div id="remote-screen" class="screen-placeholder">
                    <div class="placeholder-content">
                        <span class="placeholder-icon">🖥️</span>
                        <p>选择一个设备开始远程控制</p>
                    </div>
                </div>
                <canvas id="screen-canvas" style="display:none;"></canvas>

                <!-- 控制栏 -->
                <div id="control-bar" class="control-bar" style="display:none;">
                    <div class="control-info">
                        <span id="current-device">设备名称</span>
                    </div>
                    <div class="control-actions">
                        <button id="btn-refresh" class="btn btn-secondary" title="刷新设备列表">🔄 刷新</button>
                        <button id="btn-fullscreen" class="btn btn-secondary" title="全屏">⛶ 全屏</button>
                        <button id="btn-disconnect" class="btn btn-danger" title="断开连接">✕ 断开</button>
                    </div>
                </div>
            </section>
        </main>

        <!-- 底部状态栏 -->
        <footer class="footer">
            <span id="status-text">就绪</span>
            <span id="fps-display"></span>
        </footer>
    </div>

    <script src="/static/js/controller.js"></script>
</body>
</html>
